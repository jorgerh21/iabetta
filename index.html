<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IABetta - Tienda de Peces Betta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        body {
            background: #eef2f7;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            padding: 1rem 2rem;
            border-radius: 48px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #0f4c5c, #2b7a62);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .cart-icon {
            background: #1e4a5f;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            display: flex;
            gap: 10px;
            cursor: pointer;
            border: none;
        }

        .cart-count {
            background: #ffb347;
            padding: 2px 10px;
            border-radius: 30px;
        }

        .search-box {
            background: white;
            border-radius: 60px;
            padding: 0.5rem 1rem;
            margin-bottom: 2rem;
            display: inline-block;
            max-width: 300px;
            width: 100%;
        }

        .search-box input {
            border: none;
            padding: 0.5rem;
            width: 100%;
            outline: none;
        }

        .fish-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .fish-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .fish-card:hover {
            transform: translateY(-5px);
        }

        .fish-img {
            background: #d9e2ec;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .fish-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fish-img .no-image {
            font-size: 4rem;
        }

        .fish-info {
            padding: 1.2rem;
        }

        .fish-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #0c4e5c;
        }

        .fish-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: #2b7a62;
            margin: 0.5rem 0;
        }

        .btn-add {
            background: #1e4a5f;
            border: none;
            padding: 0.7rem;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .btn-add:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 32px;
            padding: 1.5rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 0.8rem 0;
        }

        .cart-item-qty button {
            background: #e2e8f0;
            border: none;
            width: 28px;
            border-radius: 30px;
            margin: 0 4px;
            cursor: pointer;
        }

        .cart-total {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: right;
            margin: 1rem 0;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.3rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 24px;
            border: 1px solid #ccc;
        }

        .btn-primary {
            background: #2b7a62;
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 40px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .alert {
            padding: 0.8rem;
            border-radius: 28px;
            margin-top: 1rem;
            background: #e9f5ef;
        }

        .close-modal {
            float: right;
            font-size: 1.6rem;
            cursor: pointer;
            background: none;
            border: none;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        @media (max-width: 640px) {
            .header {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🐠 IABetta</h1>
            </div>
            <button id="viewCartBtn" class="cart-icon">🛒 Carrito <span id="cartCounter"
                    class="cart-count">0</span></button>
        </div>
        <div class="search-box">
            🔍 <input type="text" id="searchInput" placeholder="Buscar betta...">
        </div>
        <div id="fishListContainer" class="fish-grid">
            <div class="loading">Cargando peces...</div>
        </div>
    </div>

    <div id="cartModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" id="closeModalBtn">&times;</button>
            <h2>🐟 Tu pedido</h2>
            <div id="cartItemsList"></div>
            <div id="cartTotalDisplay" class="cart-total"></div>
            <hr>
            <h3>Datos de envío</h3>
            <form id="checkoutForm">
                <div class="form-group"><label>Nombre completo *</label><input type="text" id="clienteNombre" required>
                </div>
                <div class="form-group"><label>Email *</label><input type="email" id="clienteEmail" required></div>
                <div class="form-group"><label>Teléfono</label><input type="tel" id="clienteTelefono"></div>
                <div class="form-group"><label>Dirección *</label><textarea id="clienteDireccion" rows="2"
                        required></textarea></div>
                <div class="form-group"><label>Transportadora *</label><select id="transportadoraId" required></select>
                </div>
                <button type="submit" class="btn-primary">Confirmar pedido</button>
                <div id="orderMessage" class="alert" style="display:none;"></div>
            </form>
        </div>
    </div>

    <script>
        // ***** CONFIGURACIÓN *****
        // Ruta de tu API (cambiar si es necesario, por ejemplo '/bettas.php')
        const API_URL = 'https://api.sitioz.com/bettas.php';
        // Prefijo del CDN para imágenes (opción 2: se concatena en el frontend)
        const CDN_IMAGE_BASE = 'https://cdn.sitioz.com/';

        // ***** VARIABLES GLOBALES *****
        let peces = [];          // catálogo desde la API
        let cart = [];           // { id, nombre, precio, imagen }
        let transportadoras = [];

        // ***** DOM ELEMENTS *****
        const fishContainer = document.getElementById('fishListContainer');
        const searchInput = document.getElementById('searchInput');
        const viewCartBtn = document.getElementById('viewCartBtn');
        const cartModal = document.getElementById('cartModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cartItemsList = document.getElementById('cartItemsList');
        const cartTotalDisplay = document.getElementById('cartTotalDisplay');
        const cartCounterSpan = document.getElementById('cartCounter');
        const checkoutForm = document.getElementById('checkoutForm');
        const transportadoraSelect = document.getElementById('transportadoraId');
        const orderMessageDiv = document.getElementById('orderMessage');

        // ***** FUNCIONES AUXILIARES *****
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Construir URL completa de imagen (opción 2: frontend agrega el CDN si es necesario)
        function getImageUrl(path) {
            if (!path) return null;
            if (path.startsWith('http://') || path.startsWith('https://')) {
                return path;
            }
            // Si es relativa, concatenar con el CDN
            return CDN_IMAGE_BASE + path.replace(/^\/+/, '');
        }

        // Actualizar contador del carrito y modal si está abierto
        function updateCartUI() {
            const totalItems = cart.length;
            cartCounterSpan.innerText = totalItems;
            if (cartModal.style.display === 'flex') renderCartModal();
        }

        function renderCartModal() {
            if (cart.length === 0) {
                cartItemsList.innerHTML = '<div class="alert">Carrito vacío</div>';
                cartTotalDisplay.innerText = 'Total: $0';
                return;
            }
            let html = '';
            let total = 0;
            cart.forEach((item, idx) => {
                total += item.precio;
                html += `
                <div class="cart-item">
                    <div><strong>${escapeHtml(item.nombre)}</strong><br>$${item.precio.toFixed(2)}</div>
                    <div class="cart-item-qty">
                        <button data-idx="${idx}" data-delta="del">🗑️</button>
                    </div>
                </div>
            `;
            });
            cartItemsList.innerHTML = html;
            cartTotalDisplay.innerText = `Total: $${total.toFixed(2)}`;

            document.querySelectorAll('.cart-item-qty button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    cart.splice(idx, 1);
                    updateCartUI();
                    renderCartModal();
                    // Refrescar botones de la galería (rehabilitar el botón del pez eliminado)
                    renderFishCatalog(searchInput.value);
                });
            });
        }

        function addToCart(pez) {
            if (cart.some(i => i.id === pez.id)) {
                alert('Este pez ya está en tu carrito. Solo puedes comprar un ejemplar de cada.');
                return false;
            }
            cart.push({
                id: pez.id,
                nombre: pez.nombre,
                precio: parseFloat(pez.precio),
                imagen: pez.imagen
            });
            updateCartUI();
            return true;
        }

        // ***** API CALLS *****
        async function loadPeces() {
            try {
                const res = await fetch(`${API_URL}/peces`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                peces = Array.isArray(data) ? data : [];
                renderFishCatalog(searchInput.value);
            } catch (err) {
                fishContainer.innerHTML = `<div class="loading">❌ Error cargando peces: ${err.message}</div>`;
            }
        }

        async function loadTransportadoras() {
            try {
                const res = await fetch(`${API_URL}/transportadoras`);
                const data = await res.json();
                transportadoras = Array.isArray(data) ? data : [];
                transportadoraSelect.innerHTML = '<option value="">Seleccione...</option>';
                transportadoras.forEach(t => {
                    transportadoraSelect.innerHTML += `<option value="${t.id}">${escapeHtml(t.nombre)}</option>`;
                });
            } catch (err) {
                console.error('Error transportadoras:', err);
            }
        }

        // ***** RENDERIZADO DE LA GALERÍA *****
        function renderFishCatalog(filter = '') {
            if (!peces.length) {
                fishContainer.innerHTML = '<div class="loading">🐟 No hay peces disponibles en este momento.</div>';
                return;
            }
            const filtered = peces.filter(p => p.nombre.toLowerCase().includes(filter.toLowerCase()));
            if (filtered.length === 0) {
                fishContainer.innerHTML = '<div class="loading">No se encontraron bettas con ese nombre.</div>';
                return;
            }

            let html = '';
            filtered.forEach(pez => {
                const imagenCompleta = getImageUrl(pez.imagen);
                const imageHtml = imagenCompleta ?
                    `<img src="${escapeHtml(imagenCompleta)}" alt="${escapeHtml(pez.nombre)}">` :
                    '<div class="no-image">🐠</div>';
                const yaEnCarrito = cart.some(i => i.id === pez.id);
                html += `
                <div class="fish-card">
                    <div class="fish-img">${imageHtml}</div>
                    <div class="fish-info">
                        <div class="fish-name">${escapeHtml(pez.nombre)}</div>
                        <div class="fish-price">$${parseFloat(pez.precio).toFixed(2)}</div>
                        <button class="btn-add" data-id="${pez.id}" ${yaEnCarrito ? 'disabled style="background:#aaa; cursor:default;"' : ''}>
                            ${yaEnCarrito ? '✓ Ya agregado' : '➕ Agregar al carrito'}
                        </button>
                    </div>
                </div>
            `;
            });
            fishContainer.innerHTML = html;

            // Asignar eventos a los botones (solo los no deshabilitados)
            document.querySelectorAll('.btn-add:not([disabled])').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.dataset.id);
                    const pez = peces.find(p => p.id === id);
                    if (pez && addToCart(pez)) {
                        btn.innerText = '✓ Ya agregado';
                        btn.disabled = true;
                    }
                });
            });
        }

        // ***** ENVÍO DEL PEDIDO *****
        checkoutForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (cart.length === 0) {
                alert('Tu carrito está vacío. Agrega peces antes de continuar.');
                return;
            }
            const nombre = document.getElementById('clienteNombre').value.trim();
            const email = document.getElementById('clienteEmail').value.trim();
            const telefono = document.getElementById('clienteTelefono').value.trim();
            const direccion = document.getElementById('clienteDireccion').value.trim();
            const transportadora_id = parseInt(transportadoraSelect.value);

            if (!nombre || !email || !direccion || !transportadora_id) {
                alert('Por favor completa: nombre, email, dirección y transportadora');
                return;
            }
            if (!/^\S+@\S+\.\S+$/.test(email)) {
                alert('Ingresa un email válido');
                return;
            }

            const items = cart.map(item => ({
                pez_id: item.id,
                precio_unitario: item.precio
            }));

            const payload = {
                cliente: { nombre, email, telefono, direccion },
                items: items,
                transportadora_id: transportadora_id
            };

            const submitBtn = checkoutForm.querySelector('.btn-primary');
            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Procesando...';
            submitBtn.disabled = true;
            orderMessageDiv.style.display = 'none';

            try {
                const res = await fetch(`${API_URL}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.success) {
                    orderMessageDiv.style.display = 'block';
                    orderMessageDiv.className = 'alert';
                    orderMessageDiv.innerHTML = `✅ ¡Pedido exitoso! Factura #${result.numero_factura || result.factura_id}. Seguimiento: ${result.tracking}`;
                    cart = [];
                    updateCartUI();
                    renderCartModal();
                    checkoutForm.reset();
                    // Recargar catálogo para reflejar la venta (ya no aparecerán los peces vendidos)
                    await loadPeces();
                    setTimeout(() => {
                        cartModal.style.display = 'none';
                        orderMessageDiv.style.display = 'none';
                    }, 4000);
                } else {
                    throw new Error(result.message || 'Error en el servidor');
                }
            } catch (err) {
                orderMessageDiv.style.display = 'block';
                orderMessageDiv.className = 'alert';
                orderMessageDiv.style.background = '#ffe0e0';
                orderMessageDiv.innerHTML = `❌ ${err.message}`;
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });

        // ***** EVENTOS DEL MODAL *****
        viewCartBtn.onclick = () => {
            renderCartModal();
            cartModal.style.display = 'flex';
        };
        closeModalBtn.onclick = () => cartModal.style.display = 'none';
        window.onclick = (e) => { if (e.target === cartModal) cartModal.style.display = 'none'; };
        searchInput.addEventListener('input', (e) => renderFishCatalog(e.target.value));

        // ***** INICIALIZACIÓN *****
        loadPeces();
        loadTransportadoras();
    </script>
</body>

</html>
